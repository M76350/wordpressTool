<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Editor | Manish Tools</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        header { background: #181825; padding: 10px 20px; border-bottom: 1px solid #313244; display:flex; align-items:center; justify-content:space-between; }
        header h1 { font-size: 1em; color: #cba6f7; }

        .toolbar { background: #181825; border-bottom: 1px solid #313244; padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .btn { border: none; padding: 6px 14px; border-radius: 5px; font-size: 0.82em; font-weight: bold; cursor: pointer; }
        .btn-load   { background: #f9e2af; color: #1e1e2e; }
        .btn-save   { background: #a6e3a1; color: #1e1e2e; }
        .btn-copy   { background: #89b4fa; color: #1e1e2e; }
        .btn-clear  { background: #313244; color: #a6adc8; }
        .btn-undo   { background: #313244; color: #cdd6f4; }
        .btn:hover  { opacity: 0.85; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .divider-v { width: 1px; background: #313244; height: 20px; }

        .stats { font-size: 0.72em; color: #6c7086; margin-left: auto; display: flex; gap: 12px; }
        .stats span { color: #a6adc8; }

        .editor-wrap { display: flex; flex: 1; overflow: hidden; }

        /* LINE NUMBERS */
        #lineNumbers {
            background: #181825;
            color: #45475a;
            padding: 14px 10px 14px 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.7;
            text-align: right;
            user-select: none;
            border-right: 1px solid #313244;
            min-width: 48px;
            overflow: hidden;
            white-space: pre;
        }

        #textEditor {
            flex: 1;
            background: #1e1e2e;
            color: #cdd6f4;
            border: none;
            padding: 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            resize: none;
            outline: none;
            line-height: 1.7;
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }

        .status-bar { background: #11111b; border-top: 1px solid #313244; padding: 4px 14px; font-size: 0.72em; color: #6c7086; display: flex; gap: 16px; }
        .status-bar span { color: #a6adc8; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="navbar-brand">⚡ <span>Manish</span> Tools</span>
    <a href="index.html" class="nav-link">🏙️ City Replace</a>
    <a href="manual-replace.html" class="nav-link">🔍 Manual Replace</a>
    <a href="html-preview.html" class="nav-link">🖥️ HTML Preview</a>
    <a href="text-editor.html" class="nav-link active">📝 Text Editor</a>
</nav>

<header>
    <h1>📝 Text Editor</h1>
    <span id="fileLabel" style="font-size:0.78em;color:#6c7086;">No file loaded</span>
</header>

<div class="toolbar">
    <button class="btn btn-load" onclick="loadFile()">📂 Load cities.txt</button>
    <button class="btn btn-save" onclick="saveFile()">💾 Download</button>
    <button class="btn btn-copy" onclick="copyText()">Copy All</button>
    <button class="btn btn-clear" onclick="clearEditor()">Clear</button>
    <div class="divider-v"></div>
    <button class="btn btn-undo" id="undoBtn" onclick="doUndo()" disabled>↩ Undo</button>
    <button class="btn btn-undo" id="redoBtn" onclick="doRedo()" disabled>↪ Redo</button>
    <div class="divider-v"></div>
    <span style="font-size:0.75em;color:#6c7086;">Find:</span>
    <input type="text" id="frFind" placeholder="Find..." style="background:#1e1e2e;border:1px solid #cba6f7;color:#cdd6f4;padding:5px 8px;border-radius:4px;font-size:0.82em;outline:none;width:110px;">
    <span style="font-size:0.75em;color:#6c7086;">Replace:</span>
    <input type="text" id="frReplace" placeholder="Replace..." style="background:#1e1e2e;border:1px solid #89b4fa;color:#cdd6f4;padding:5px 8px;border-radius:4px;font-size:0.82em;outline:none;width:110px;">
    <button class="btn" onclick="doReplace()" style="background:#cba6f7;color:#1e1e2e;">Replace All</button>
    <span id="frMsg" style="font-size:0.75em;color:#a6e3a1;"></span>
    <div class="stats">
        Lines: <span id="statLines">0</span>
        Words: <span id="statWords">0</span>
        Chars: <span id="statChars">0</span>
    </div>
</div>

<div class="editor-wrap">
    <div id="lineNumbers">1</div>
    <textarea id="textEditor" placeholder="Paste or type your text here, or click 'Load cities.txt'..." spellcheck="false" oninput="onInput()"></textarea>
</div>

<div class="status-bar">
    <span>Line: <span id="curLine">1</span></span>
    <span>Col: <span id="curCol">1</span></span>
    <span id="statusMsg" style="color:#a6e3a1;"></span>
</div>

<script>
    let history = [];
    let histIdx  = -1;
    let saveTimer = null;

    // ── HISTORY ──
    function saveHistory() {
        const val = document.getElementById('textEditor').value;
        history = history.slice(0, histIdx + 1);
        history.push(val);
        histIdx = history.length - 1;
        updateBtns();
    }

    function doUndo() {
        if (histIdx <= 0) return;
        histIdx--;
        document.getElementById('textEditor').value = history[histIdx];
        updateStats(); updateLineNumbers(); updateBtns();
    }

    function doRedo() {
        if (histIdx >= history.length - 1) return;
        histIdx++;
        document.getElementById('textEditor').value = history[histIdx];
        updateStats(); updateLineNumbers(); updateBtns();
    }

    function updateBtns() {
        document.getElementById('undoBtn').disabled = histIdx <= 0;
        document.getElementById('redoBtn').disabled = histIdx >= history.length - 1;
    }

    // ── INPUT ──
    function onInput() {
        updateStats();
        updateLineNumbers();
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveHistory, 600);
    }

    // ── LINE NUMBERS ──
    function updateLineNumbers() {
        const lines = document.getElementById('textEditor').value.split('\n').length;
        document.getElementById('lineNumbers').textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
    }

    // ── STATS ──
    function updateStats() {
        const val = document.getElementById('textEditor').value;
        const lines = val.split('\n').length;
        const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
        const chars = val.length;
        document.getElementById('statLines').textContent = lines;
        document.getElementById('statWords').textContent = words;
        document.getElementById('statChars').textContent = chars;
    }

    // ── CURSOR POSITION ──
    document.addEventListener('DOMContentLoaded', () => {
        const ta = document.getElementById('textEditor');
        ta.addEventListener('keyup', updateCursor);
        ta.addEventListener('click', updateCursor);
        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
        });
        // Tab key
        ta.addEventListener('keydown', e => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = ta.selectionStart;
                ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(ta.selectionEnd);
                ta.selectionStart = ta.selectionEnd = s + 4;
                onInput();
            }
        });
        // Sync scroll
        ta.addEventListener('scroll', () => {
            document.getElementById('lineNumbers').scrollTop = ta.scrollTop;
        });
        loadFile();
    });

    function updateCursor() {
        const ta  = document.getElementById('textEditor');
        const txt = ta.value.substring(0, ta.selectionStart);
        const lines = txt.split('\n');
        document.getElementById('curLine').textContent = lines.length;
        document.getElementById('curCol').textContent  = lines[lines.length - 1].length + 1;
    }

    // ── LOAD cities.txt ──
    async function loadFile() {
        try {
            const r = await fetch('cities.txt');
            const t = await r.text();
            document.getElementById('textEditor').value = t;
            document.getElementById('fileLabel').textContent = 'cities.txt';
            saveHistory();
            updateStats();
            updateLineNumbers();
            setStatus('✅ cities.txt loaded');
        } catch(e) {
            alert('Could not load cities.txt');
        }
    }

    // ── DOWNLOAD ──
    function saveFile() {
        const val = document.getElementById('textEditor').value;
        const blob = new Blob([val], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'cities.txt';
        a.click();
        setStatus('✅ Downloaded!');
    }

    // ── COPY ──
    function copyText() {
        const val = document.getElementById('textEditor').value;
        if (!val.trim()) { alert('Nothing to copy!'); return; }
        navigator.clipboard.writeText(val).then(() => setStatus('✅ Copied!'));
    }

    // ── CLEAR ──
    function clearEditor() {
        if (!confirm('Clear editor?')) return;
        document.getElementById('textEditor').value = '';
        history = []; histIdx = -1;
        updateStats(); updateLineNumbers(); updateBtns();
        document.getElementById('fileLabel').textContent = 'No file loaded';
        setStatus('Cleared');
    }

    // ── FIND & REPLACE ──
    function doReplace() {
        const find = document.getElementById('frFind').value;
        const repl = document.getElementById('frReplace').value;
        if (!find) { alert('Enter a word to find!'); return; }
        const ta   = document.getElementById('textEditor');
        const count = ta.value.split(find).length - 1;
        if (count === 0) { alert(`"${find}" not found!`); return; }
        ta.value = ta.value.split(find).join(repl);
        saveHistory();
        updateStats(); updateLineNumbers();
        document.getElementById('frMsg').textContent = `✔ ${count} replaced`;
        setTimeout(() => document.getElementById('frMsg').textContent = '', 3000);
    }

    // ── STATUS ──
    function setStatus(msg) {
        document.getElementById('statusMsg').textContent = msg;
        setTimeout(() => document.getElementById('statusMsg').textContent = '', 3000);
    }
</script>

</body>
</html>
