    <script>
        let currentIdx = 0;

        function init() {
            const links = [...document.querySelectorAll('.city-links a')];
            links.forEach((link, i) => {
                link.addEventListener('click', () => {
                    // Mark this link as opened
                    link.style.color      = '#a6e3a1';
                    link.style.fontWeight = 'bold';

                    // If manually clicked link is ahead of currentIdx, advance to next
                    if (i >= currentIdx) {
                        currentIdx = i + 1;
                        updateBtn(links);
                    }
                });
            });
            updateBtn(links);
        }

        function updateBtn(links) {
            const btn = document.getElementById('openBtn');
            const msg = document.getElementById('statusMsg');
            const opened = [...document.querySelectorAll('.city-links a')]
                .filter(l => l.style.color === 'rgb(166, 227, 161)').length;

            if (currentIdx >= links.length) {
                btn.textContent = '✅ All Done';
                btn.disabled    = true;
                msg.textContent = `All ${links.length} links opened!`;
            } else {
                btn.textContent = `🚀 Open Next Link (${currentIdx + 1}/${links.length})`;
                msg.textContent = opened > 0
                    ? `✔ ${opened} opened — ${links.length - currentIdx} remaining`
                    : 'Click to open links one by one';
                btn.disabled = false;
            }
        }

        function openNextLink() {
            const links = [...document.querySelectorAll('.city-links a')];
            if (currentIdx >= links.length) return;

            const link = links[currentIdx];
            const a = document.createElement('a');
            a.href = link.href; a.target = '_blank'; a.rel = 'noopener noreferrer';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);

            link.style.color      = '#a6e3a1';
            link.style.fontWeight = 'bold';
            currentIdx++;
            updateBtn(links);
        }

        function resetLinks() {
            currentIdx = 0;
            document.querySelectorAll('.city-links a').forEach(l => {
                l.style.color = ''; l.style.fontWeight = '';
            });
            updateBtn([...document.querySelectorAll('.city-links a')]);
            document.getElementById('statusMsg').textContent = 'Click to open links one by one';
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
